<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Predicta{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="app-header">
    <div class="container">
      <div class="logo"><a href="{{ url_for('index') }}">Predicta</a></div>
      <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">☰</button>
      <nav class="nav-links" id="nav-links">
        <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a>
        <a href="{{ url_for('recommendations_page') }}" class="{% if request.endpoint == 'recommendations_page' %}active{% endif %}">Recommendations</a>
        <a href="{{ url_for('choose_with_friends_page') }}" class="{% if request.endpoint == 'choose_with_friends_page' %}active{% endif %}">Choose with Friends</a>
        <a href="{{ url_for('favorites_page') }}" class="{% if request.endpoint == 'favorites_page' %}active{% endif %}">Library</a>
        <span class="auth-badge">{% if current_user %}Logged in{% else %}Guest{% endif %}</span>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer class="app-footer">
    <p class="footer-copyright">Predicta</p>
  </footer>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/moviedb.js') }}"></script>
  <script>
    (function() {
      var btn = document.querySelector('.nav-toggle');
      var nav = document.getElementById('nav-links');
      if (btn && nav) {
        btn.addEventListener('click', function() {
          nav.classList.toggle('is-open');
          btn.setAttribute('aria-expanded', nav.classList.contains('is-open'));
        });
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
